stages:
- name: Build
  steps:
  - runScriptConfig:
      image: maven:3-openjdk-11
      shellScript: mvn package -DskipTests
- name: Build Docker with DIND
  steps:
  - publishImageConfig:
      dockerfilePath: ./Dockerfile
      buildContext: .
      tag: docker.dev.folio.org/edge-rtac:core-functional-latest
      pushRemote: true
      registry: docker.dev.folio.org
- name: Deploy
  steps:
  - applyAppConfig:
      catalogTemplate: p-9mwdx:core-functional-helmcharts-edge-rtac
      version: 0.1.20
      answers:
        image.repository: docker.dev.folio.org/edge-rtac
        image.tag: core-functional-latest
        ingress.enabled: "true"
        ingress.hosts[0].host: edge-rtac-core-functional.ci.folio.org
        ingress.hosts[0].paths[0]: /
      name: edge-rtac
      targetNamespace: core-functional
timeout: 60
notification: {}
